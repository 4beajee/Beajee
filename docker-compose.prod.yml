services:
  app:
    image: beajee-app
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_LANDING_URL: ${NEXT_PUBLIC_LANDING_URL}
    container_name: beajee-app
    restart: unless-stopped
    init: true
    ports:
      - "127.0.0.1:3000:3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
      - /app/.next/cache:size=128m,uid=1001,gid=1001
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/api/mcp"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
