name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: beajee
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d beajee"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/beajee
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/beajee
      NEXTAUTH_SECRET: ci-nextauth-secret
      NEXTAUTH_URL: http://localhost:3000
      OPENAI_API_KEY: ci-openai-key
      ANTHROPIC_API_KEY: ""
      ANALYTICS_ADMIN_SECRET: ci-analytics-secret
      CRON_SECRET: ci-cron-secret
      CONSENT_IP_SALT: ci-consent-salt

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan Git history for secrets
        run: >-
          docker run --rm -v "$PWD:/repo" -w /repo
          zricethezav/gitleaks@sha256:c00b6bd0aeb3071cbcb79009cb16a60dd9e0a7c60e2be9ab65d25e6bc8abbb7f
          git --redact --no-banner

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to clean database
        run: npx prisma migrate deploy

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: verify
    if: always()
    steps:
      - name: Require Verify success
        run: |
          if [ "${{ needs.verify.result }}" != "success" ]; then
            echo "Verify job did not pass: ${{ needs.verify.result }}"
            exit 1
          fi
          echo "Verify job passed."
