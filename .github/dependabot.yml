version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 10
    groups:
      npm-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # eslint 10.4+ pulls in eslint-plugin-react-hooks 7.1.x, which
      # enables react-hooks/set-state-in-effect and fails lint on 14
      # existing useEffect callsites in the codebase. Bumps are pinned
      # via overrides; unblock once the callsites are refactored.
      - dependency-name: "eslint"
      - dependency-name: "eslint-config-next"
      - dependency-name: "eslint-plugin-react-hooks"
    labels:
      - "dependencies"
      - "area:maintenance"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "Etc/UTC"
    labels:
      - "dependencies"
      - "area:ci"
